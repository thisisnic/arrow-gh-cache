name: Update cache

on:
  schedule:
    - cron: '15 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Ensure cache-latest release exists
        run: |
          gh release view cache-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create cache-latest \
                 --repo "$GITHUB_REPOSITORY" \
                 --title "GitHub cache" \
                 --notes "Rolling snapshot of apache/arrow issues, PRs, and comments. Assets are replaced in place on each run."

      - name: Fetch data
        run: Rscript R/run.R

      - name: Upload assets
        run: |
          gh release upload cache-latest artifacts/*.parquet \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
